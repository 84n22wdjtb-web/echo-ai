<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Première rencontre - Écho</title>

<style>
body {
    margin: 0;
    font-family: Georgia, serif;
    background: #faf7f2;
    color: #3d3a36;
}

.container {
    max-width: 700px;
    margin: auto;
    padding: 60px 20px;
    text-align: center;
}

.logo {
    font-size: 42px;
    letter-spacing: 5px;
    font-weight: bold;
}

.card {
    background: white;
    margin-top: 50px;
    padding: 35px;
    border-radius: 25px;
}

h1 {
    font-size: 32px;
}

p {
    font-size: 20px;
    line-height: 1.6;
}

input {
    width: 80%;
    padding: 15px;
    margin-top: 25px;
    border-radius: 20px;
    border: 1px solid #ddd;
    font-size: 18px;
}

button {
    margin-top: 25px;
    padding: 15px 35px;
    border: none;
    border-radius: 30px;
    background: #78977b;
    color: white;
    font-size: 18px;
    cursor: pointer;
}
</style>

</head>

<body>

<div class="container">

<div class="logo">
ÉCHO
</div>

<div class="card">

<h1>
Bonjour 👋
</h1>

<p>
Je suis Écho.
</p>

<p>
Je suis là pour apprendre à te connaître,
écouter ton histoire et t'accompagner
dans tes réflexions.
</p>

<p>
Il n'y a aucune obligation de tout raconter.
Tu avances à ton rythme.
</p>

<h2>
Comment puis-je t'appeler ?
</h2>

<input type="text" placeholder="Ton prénom ou ton surnom">

<br>

<button>
Continuer mon histoire
</button>

</div>

</div>

</body>
</html>
